# Build standalone Vintage Radio executable (Windows + macOS)
# Creates a GitHub Release with binaries when you push a version tag (e.g. v0.1.0-beta).
# To create your first release: git tag v0.1.0-beta && git push origin v0.1.0-beta
# Also runs on: push to release (build only), release publish (attach to that release), or manual "Run workflow".
#
# Release notes: The job uses permissions: contents: write. If "generate release notes" still fails with 403,
# add a Personal Access Token (classic) with scope "repo" as a repo secret named RELEASE_TOKEN.

name: Build release

on:
  push:
    branches: [release]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Vintage-Radio-Windows
          - os: macos-15
            artifact: Vintage-Radio-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install macOS build dependencies (macOS only)
        if: runner.os == 'macOS'
        run: brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create Windows .ico from PNG (Windows only)
        if: runner.os == 'Windows'
        run: |
          pip install Pillow
          python -c "from PIL import Image; Image.open('gui/resources/vintage_radio.png').save('gui/resources/vintage_radio.ico', format='ICO', sizes=[(256,256),(48,48),(32,32),(16,16)])"

      - name: Generate macOS .icns icon (macOS only)
        if: runner.os == 'macOS'
        run: |
          ICONSET='gui/resources/vintage_radio.iconset'
          ICNS='gui/resources/vintage_radio.icns'
          rm -rf "$ICONSET"
          if [ -f 'gui/resources/vintage_radio.svg' ]; then
            echo "Generating .icns from SVG..."
            python3 -c "
          from PyQt6.QtSvg import QSvgRenderer
          from PyQt6.QtGui import QImage, QPainter
          from PyQt6.QtCore import QSize, Qt
          import os
          renderer = QSvgRenderer('gui/resources/vintage_radio.svg')
          os.makedirs('$ICONSET', exist_ok=True)
          for size in [16, 32, 64, 128, 256, 512, 1024]:
              img = QImage(QSize(size, size), QImage.Format.Format_ARGB32)
              img.fill(Qt.GlobalColor.transparent)
              p = QPainter(img)
              renderer.render(p)
              p.end()
              if size <= 512:
                  img.save(f'$ICONSET/icon_{size}x{size}.png')
              if size >= 32:
                  half = size // 2
                  img.save(f'$ICONSET/icon_{half}x{half}@2x.png')
          " && iconutil -c icns "$ICONSET" -o "$ICNS" && rm -rf "$ICONSET" && echo "Icon from SVG OK"
          elif [ -f 'gui/resources/vintage_radio.png' ]; then
            echo "Generating .icns from PNG..."
            mkdir -p "$ICONSET"
            for size in 16 32 64 128 256 512; do
              sips -z $size $size gui/resources/vintage_radio.png --out "$ICONSET/icon_${size}x${size}.png"
              [ $size -ge 32 ] && half=$((size/2)) && sips -z $half $half gui/resources/vintage_radio.png --out "$ICONSET/icon_${half}x${half}@2x.png"
            done
            iconutil -c icns "$ICONSET" -o "$ICNS"
            rm -rf "$ICONSET"
            echo "Icon from PNG OK"
          else
            echo "No SVG or PNG icon found; build will use spec default"
          fi

      - name: Clean build directories (macOS only)
        if: runner.os == 'macOS'
        run: rm -rf dist build

      - name: Build with PyInstaller
        run: pyinstaller vintage_radio.spec --noconfirm

      - name: Verify macOS app bundle
        if: runner.os == 'macOS'
        run: |
          test -d "dist/Vintage Radio.app" || (echo "Expected dist/Vintage Radio.app not found. dist contents:" && ls -la dist && exit 1)
          test -f "dist/Vintage Radio.app/Contents/MacOS/Vintage Radio" || (echo "App executable missing" && exit 1)
          test -f "dist/Vintage Radio.app/Contents/Info.plist" || (echo "Info.plist missing" && exit 1)
          echo "Vintage Radio.app bundle OK"

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Vintage Radio/

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Vintage Radio.app

  # Create/update a GitHub Release and attach built binaries (on tag push or release published)
  upload-release:
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Windows build
        run: |
          cd artifacts/Vintage-Radio-Windows
          zip -r ../../Vintage-Radio-Windows.zip .
          cd ../..

      - name: Zip macOS build
        run: |
          cd artifacts/Vintage-Radio-macOS
          zip -r ../../Vintage-Radio-macOS.zip "Vintage Radio.app"
          cd ../..

      - name: Create Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          name: Release ${{ github.event.release.tag_name || github.ref_name }}
          generate_release_notes: true
          files: |
            Vintage-Radio-Windows.zip
            Vintage-Radio-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
