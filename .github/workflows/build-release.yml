# Build standalone Vintage Radio executable (Windows + macOS)
# Creates a GitHub Release with binaries when you push a version tag (e.g. v0.1.0-beta).
# To create your first release: git tag v0.1.0-beta && git push origin v0.1.0-beta
# Also runs on: push to release (build only), release publish (attach to that release), or manual "Run workflow".
#
# macOS note: We use macos-13 (Intel) so the x86_64 binary runs on ALL Macs:
#   - Intel Macs: runs natively
#   - Apple Silicon Macs: runs via Rosetta 2 (automatic, no user action needed)
#
# Release notes: The job uses permissions: contents: write. If "generate release notes" still fails with 403,
# add a Personal Access Token (classic) with scope "repo" as a repo secret named RELEASE_TOKEN.

name: Build release

on:
  push:
    branches: [release]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Vintage-Radio-Windows
          - os: macos-13
            artifact: Vintage-Radio-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create Windows .ico from PNG (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          pip install Pillow
          python -c "from PIL import Image; Image.open('gui/resources/vintage_radio.png').save('gui/resources/vintage_radio.ico', format='ICO', sizes=[(256,256),(48,48),(32,32),(16,16)])"

      - name: Create macOS .icns from PNG (macOS only)
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p vintage_radio.iconset
          sips -z 16 16     gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_16x16.png
          sips -z 32 32     gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_16x16@2x.png
          sips -z 32 32     gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_32x32.png
          sips -z 64 64     gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_32x32@2x.png
          sips -z 128 128   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_128x128.png
          sips -z 256 256   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_128x128@2x.png
          sips -z 256 256   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_256x256.png
          sips -z 512 512   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_256x256@2x.png
          sips -z 512 512   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_512x512.png
          sips -z 1024 1024 gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_512x512@2x.png
          iconutil -c icns vintage_radio.iconset -o gui/resources/vintage_radio.icns
          rm -rf vintage_radio.iconset

      - name: Build with PyInstaller (macOS)
        if: startsWith(matrix.os, 'macos')
        run: python -m PyInstaller vintage_radio.spec

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller vintage_radio.spec

      - name: Package macOS app bundle
        if: startsWith(matrix.os, 'macos')
        run: |
          echo "=== PyInstaller output ==="
          ls -la dist/

          # The spec BUNDLE() step creates dist/Vintage Radio.app/
          # If it exists, use it directly; otherwise wrap the folder
          if [ -d "dist/Vintage Radio.app" ]; then
            echo "Found .app bundle from BUNDLE() step"
            APP_SOURCE="dist/Vintage Radio.app"
          elif [ -d "dist/Vintage Radio" ]; then
            echo "No .app bundle found, wrapping folder"
            mv "dist/Vintage Radio" "dist/Vintage Radio.app"
            APP_SOURCE="dist/Vintage Radio.app"
          else
            echo "ERROR: No build output found!"
            ls -la dist/
            exit 1
          fi

          # Create distribution folder with .app and README
          mkdir -p "dist/package"
          mv "$APP_SOURCE" "dist/package/"
          cp scripts/README.txt "dist/package/"

          echo ""
          echo "=== Final package contents ==="
          ls -la "dist/package/"
          echo ""
          echo "=== Binary architecture ==="
          file "dist/package/Vintage Radio.app/Contents/MacOS/Vintage Radio"

      - name: Upload artifact (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/package/

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Vintage Radio/

  # Create/update a GitHub Release and attach built binaries (on tag push or release published)
  upload-release:
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Windows build
        run: |
          cd artifacts/Vintage-Radio-Windows
          zip -r ../../Vintage-Radio-Windows.zip .
          cd ../..

      - name: Zip macOS build
        run: |
          cd artifacts/Vintage-Radio-macOS
          zip -r ../../Vintage-Radio-macOS.zip .
          cd ../..

      - name: Create Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          name: Release ${{ github.event.release.tag_name || github.ref_name }}
          generate_release_notes: true
          files: |
            Vintage-Radio-Windows.zip
            Vintage-Radio-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
