# Build standalone Vintage Radio executable for testing (any branch)
# Artifacts are uploaded for download but NO release is created.
# Trigger: push to any branch, or manual "Run workflow" on any branch.

name: Build test artifacts

on:
  push:
    branches-ignore: [release]
    tags-ignore: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Vintage-Radio-Windows-test
          - os: macos-latest
            artifact: Vintage-Radio-macOS-test

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create Windows .ico from PNG (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          pip install Pillow
          python -c "from PIL import Image; Image.open('gui/resources/vintage_radio.png').save('gui/resources/vintage_radio.ico', format='ICO', sizes=[(256,256),(48,48),(32,32),(16,16)])"

      - name: Build with PyInstaller
        run: pyinstaller vintage_radio.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Vintage Radio/
          retention-days: 7

