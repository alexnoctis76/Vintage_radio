# Build standalone Vintage Radio executable for testing (any branch)
# Artifacts are uploaded for download but NO release is created.
# Trigger: push to any branch, or manual "Run workflow" on any branch.

name: Build test artifacts

on:
  push:
    branches-ignore: [release]
    tags-ignore: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Vintage-Radio-Windows-test
          - os: macos-latest
            artifact: Vintage-Radio-macOS-test

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install macOS build dependencies (macOS only)
        if: matrix.os == 'macos-latest'
        run: brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create Windows .ico from PNG (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          pip install Pillow
          python -c "from PIL import Image; Image.open('gui/resources/vintage_radio.png').save('gui/resources/vintage_radio.ico', format='ICO', sizes=[(256,256),(48,48),(32,32),(16,16)])"

      - name: Generate macOS .icns icon (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          python3 -c "
          from PyQt6.QtSvg import QSvgRenderer
          from PyQt6.QtGui import QImage, QPainter
          from PyQt6.QtCore import QSize, Qt
          renderer = QSvgRenderer('gui/resources/vintage_radio.svg')
          import os, pathlib
          iconset = 'gui/resources/vintage_radio.iconset'
          os.makedirs(iconset, exist_ok=True)
          for size in [16, 32, 64, 128, 256, 512, 1024]:
              img = QImage(QSize(size, size), QImage.Format.Format_ARGB32)
              img.fill(Qt.GlobalColor.transparent)
              p = QPainter(img)
              renderer.render(p)
              p.end()
              if size <= 512:
                  img.save(f'{iconset}/icon_{size}x{size}.png')
              if size >= 32:
                  half = size // 2
                  img.save(f'{iconset}/icon_{half}x{half}@2x.png')
          "
          iconutil -c icns gui/resources/vintage_radio.iconset -o gui/resources/vintage_radio.icns
          rm -rf gui/resources/vintage_radio.iconset

      - name: Build with PyInstaller
        run: pyinstaller vintage_radio.spec --noconfirm

      - name: Verify macOS app bundle
        if: matrix.os == 'macos-latest'
        run: |
          test -d "dist/Vintage Radio.app" || (echo "Expected dist/Vintage Radio.app not found. dist contents:" && ls -la dist && exit 1)
          test -f "dist/Vintage Radio.app/Contents/MacOS/Vintage Radio" || (echo "App executable missing" && exit 1)
          test -f "dist/Vintage Radio.app/Contents/Info.plist" || (echo "Info.plist missing" && exit 1)
          echo "Vintage Radio.app bundle OK (icon in Contents/Resources if .icns was built)"

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Vintage Radio/
          retention-days: 7

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist
          retention-days: 7
