# Build standalone Vintage Radio executable for testing (any branch)
# Artifacts are uploaded for download but NO release is created.
# Trigger: push to any branch, or manual "Run workflow" on any branch.

name: Build test artifacts

on:
  push:
    branches-ignore: [release]
    tags-ignore: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Vintage-Radio-Windows-test
          - os: macos-latest
            artifact: Vintage-Radio-macOS-test

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create Windows .ico from PNG (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          pip install Pillow
          python -c "from PIL import Image; Image.open('gui/resources/vintage_radio.png').save('gui/resources/vintage_radio.ico', format='ICO', sizes=[(256,256),(48,48),(32,32),(16,16)])"

      - name: Create macOS .icns from PNG (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p vintage_radio.iconset
          sips -z 16 16     gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_16x16.png
          sips -z 32 32     gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_16x16@2x.png
          sips -z 32 32     gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_32x32.png
          sips -z 64 64     gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_32x32@2x.png
          sips -z 128 128   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_128x128.png
          sips -z 256 256   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_128x128@2x.png
          sips -z 256 256   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_256x256.png
          sips -z 512 512   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_256x256@2x.png
          sips -z 512 512   gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_512x512.png
          sips -z 1024 1024 gui/resources/vintage_radio.png --out vintage_radio.iconset/icon_512x512@2x.png
          iconutil -c icns vintage_radio.iconset -o gui/resources/vintage_radio.icns
          rm -rf vintage_radio.iconset

      - name: Build with PyInstaller
        run: pyinstaller vintage_radio.spec

      - name: Smoke test (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "Checking .app bundle exists..."
          test -d "dist/Vintage Radio.app" && echo "OK: .app bundle created" || echo "WARN: .app bundle not found, falling back to folder"
          echo "Checking bundled resources..."
          find "dist/Vintage Radio.app" -name "AMradioSound.wav" | head -1 || find "dist/Vintage Radio" -name "AMradioSound.wav" | head -1
          echo "Checking bundled Python for mpremote..."
          find "dist" -name "python3" -type f | head -3

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Vintage Radio/
          retention-days: 7

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Vintage Radio.app/
          retention-days: 7

